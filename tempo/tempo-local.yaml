server:
  http_listen_port: 4318
  grpc_listen_port: 4317
  log_level: info

receivers:
  otlp:
    protocols:
      grpc: {}
      http: {}

distributor:
  receivers: [otlp]

ingester:
  wal:
    enabled: true
    dir: /var/tempo/wal

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
